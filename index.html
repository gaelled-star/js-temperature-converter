<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature Conversion Program</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form>
  <h1>Temperature Converter</h1>

  <p>Celsius to Fahrenheit</p>

<div class="row">
  <div class="input-group">
    <input type="number" id="celsiusInput" placeholder="0">
    <span>°C</span>
  </div>

  <div class="input-group">
    <input type="number" id="fahrenheitOutput" placeholder="0" readonly>
    <span>°F</span>
  </div>
</div>

<p>Fahrenheit to Celsius</p>

<div class="row">
  <div class="input-group">
    <input type="number" id="fahrenheitInput" placeholder="0">
    <span>°F</span>
  </div>

  <div class="input-group">
    <input type="number" id="celsiusOutput" placeholder="0" readonly>
    <span>°C</span>
  </div>
</div>
</form>
    <script src="index.js"></script>
  </body>
</html>
